run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck      # 检查未处理的错误
    - gosimple      # 代码简化建议
    - govet         # go vet
    - ineffassign   # 检测无效赋值
    - staticcheck   # 静态分析
    - unused        # 未使用的代码
    - gofmt         # 格式化检查
    - goimports     # import 排序检查
    - misspell      # 拼写检查

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true

  govet:
    enable-all: false
    disable:
      - shadow

  gofmt:
    simplify: true

issues:
  exclude-rules:
    # 测试文件放宽部分规则
    - path: _test\.go
      linters:
        - errcheck

  max-issues-per-linter: 0
  max-same-issues: 0