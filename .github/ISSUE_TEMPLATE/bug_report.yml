name: Bug Report
description: 报告一个 Bug
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你报告 Bug！请填写以下信息帮助我们定位问题。

  - type: textarea
    id: description
    attributes:
      label: Bug 描述
      description: 清晰描述遇到的问题
      placeholder: "例如：执行 zashhomo install 时报错 ..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 如何复现这个 Bug
      placeholder: |
        1. 执行 `zashhomo ...`
        2. 观察到 ...
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 预期行为
      description: 你期望发生什么
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: 实际发生了什么
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: zashhomo 版本
      description: 运行 `zashhomo version` 获取
      placeholder: "v0.x.x"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: 操作系统
      options:
        - Windows
        - Linux
        - macOS
    validations:
      required: true

  - type: dropdown
    id: arch
    attributes:
      label: 架构
      options:
        - amd64
        - arm64
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 日志输出
      description: 相关的日志内容（请移除敏感信息）
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: 补充信息
      description: 其他可能有帮助的信息