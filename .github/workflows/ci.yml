name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: build & vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          check-latest: true

      - name: Verify formatting
        run: |
          fmtout="$(gofmt -l cmd internal)"
          if [ -n "$fmtout" ]; then
            echo "These files are not gofmt-clean:"
            echo "$fmtout"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race ./...

      - name: Build
        env:
          CGO_ENABLED: '0'
        run: go build ./...

  cross:
    name: cross-compile ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux builds - temporarily disabled
          # - { goos: linux,   goarch: amd64 }
          # - { goos: linux,   goarch: arm64 }
          # macOS builds - temporarily disabled
          # - { goos: darwin,  goarch: amd64 }
          # - { goos: darwin,  goarch: arm64 }
          # Windows builds - currently supported
          - { goos: windows, goarch: amd64 }
          - { goos: windows, goarch: arm64 }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          check-latest: true

      - name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -trimpath -ldflags "-s -w" ./cmd/zashhomo
