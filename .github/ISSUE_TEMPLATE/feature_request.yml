name: Feature Request
description: 提出一个功能建议
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你的功能建议！请描述你希望添加的功能。

  - type: textarea
    id: problem
    attributes:
      label: 你的需求
      description: 这个功能解决什么问题？
      placeholder: "我希望能够 ...，因为 ..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 建议的解决方案
      description: 你希望如何实现这个功能
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 你考虑过的其他解决方案

  - type: textarea
    id: additional
    attributes:
      label: 补充信息
      description: 其他相关上下文、截图等